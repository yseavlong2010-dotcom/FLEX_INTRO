// palofsc: Cấu hình Tối ưu Hóa Gói Tin Mạng - Shadowrocket / ProxyPin
// Phiên bản: 2.1 (Tối ưu Regex & Phân luồng)
// Mục tiêu: Giảm Jitter, ổn định đường truyền cho Free Fire Max trên iOS.

// --- BỘ LỌC REWRITE (Shadowrocket .conf format) ---
// Đặt dưới [Rewrite]
// Regex cực ngắn để tránh tràn bộ nhớ tạm của iOS. 
// Chỉ can thiệp vào các API response cụ thể của Garena.
^https?:\/\/.*\.garena\.com\/api\/v[0-9]\/game_data url script-response-body https://your-server.com/scripts/AimX_Inject.js
^https?:\/\/.*\.ff\.garena\.com\/events url reject-200 // Chặn quảng cáo sự kiện để giảm băng thông

// --- BỘ ĐỊNH TUYẾN RULES ---
// Đặt dưới [Rule]
// Ưu tiên cao nhất cho game server, loại bỏ các kết nối không cần thiết.
DOMAIN-SUFFIX,garena.com,PROXY
DOMAIN-KEYWORD,freefire,PROXY
// Dải IP thường dùng của máy chủ game khu vực SEA/VN (Cần cập nhật chính xác theo thực tế)
IP-CIDR,103.111.0.0/16,PROXY,no-resolve 
IP-CIDR,203.116.0.0/16,PROXY,no-resolve
// Bypass các kết nối Apple/Local để tránh lỗi hệ thống iOS
DOMAIN-SUFFIX,apple.com,DIRECT
DOMAIN-SUFFIX,icloud.com,DIRECT
IP-CIDR,192.168.0.0/16,DIRECT
IP-CIDR,10.0.0.0/8,DIRECT
IP-CIDR,172.16.0.0/12,DIRECT
GEOIP,VN,DIRECT // Có thể thay đổi tuỳ thuộc vào vị trí VPS (nếu VPS ở VN thì để DIRECT, nếu ở nước ngoài thì để PROXY)
FINAL,PROXY

// --- SCRIPT XỬ LÝ (AimX_Inject.js) ---
// Cơ chế: Safe Injection (Try/Catch) - Bắt buộc để chống văng App.
// Chỉ sửa đổi các trường JSON cần thiết, trả về nguyên bản nếu lỗi.
const url = $request.url;
let body = $response.body;

try {
    // Chỉ xử lý nếu là JSON hợp lệ
    let obj = JSON.parse(body);
    
    // Tối ưu hóa phản hồi số liệu mạng (Giả lập response nhanh hơn)
    if (url.includes("/game_data")) {
        if (obj.network_status) {
            obj.network_status.latency = 1; // Ép thông số hiển thị
            obj.network_status.jitter = 0;
        }
        // Xóa các mảng telemetry không cần thiết gửi về server
        if (obj.telemetry) {
            delete obj.telemetry;
        }
    }
    
    // Trả về dữ liệu đã can thiệp
    $done({ body: JSON.stringify(obj) });

} catch (err) {
    // Lỗi parse JSON -> Trả về nguyên gốc, KHÔNG GÂY CRASH APP
    $done({ body: body });
}
