[General]
loglevel = notify
bypass-system = true
dns-server = 1.1.1.1, 8.8.8.8
[Rule]
=======================================================
1. BỘ MỞ KHÓA ĐĂNG NHẬP TUYỆT ĐỐI (DIRECT WHITELIST)
Mọi luồng API đăng nhập bắt buộc đi thẳng mạng thật, cấm Proxy
=======================================================
Apple / iOS System
DOMAIN-SUFFIX,apple.com,DIRECT
DOMAIN-SUFFIX,icloud.com,DIRECT
DOMAIN-SUFFIX,cdn-apple.com,DIRECT
Facebook & FB SDK
DOMAIN-SUFFIX,facebook.com,DIRECT
DOMAIN-SUFFIX,facebook.net,DIRECT
DOMAIN-SUFFIX,fbcdn.net,DIRECT
DOMAIN-SUFFIX,graph.facebook.com,DIRECT
DOMAIN-KEYWORD,fbsbx,DIRECT
Google / Gmail
DOMAIN-SUFFIX,google.com,DIRECT
DOMAIN-SUFFIX,googleapis.com,DIRECT
DOMAIN-SUFFIX,gstatic.com,DIRECT
DOMAIN-SUFFIX,googleusercontent.com,DIRECT
Garena Auth (Cổng xác thực tài khoản Garena)
DOMAIN-KEYWORD,sso.garena,DIRECT
DOMAIN-KEYWORD,auth.garena,DIRECT
DOMAIN-KEYWORD,account.garena,DIRECT
=======================================================
2. CHẶN MÁY CHỦ QUÉT GIAN LẬN (ANTI-BAN)
=======================================================
DOMAIN-KEYWORD,crashreport,REJECT
DOMAIN-KEYWORD,telemetry,REJECT
DOMAIN-KEYWORD,apm.garena,REJECT
=======================================================
3. ÉP MẠNG GAME QUA VPS/PROXY ĐỂ CÓ TÁC DỤNG SCRIPT
=======================================================
DOMAIN-SUFFIX,garena.com,Proxy
DOMAIN-SUFFIX,freefiremobile.com,Proxy
FINAL,DIRECT
[Script]
Gọi Script AimX từ Github (Mã hóa siêu việt)
azexl_aim_drag = type=http-response,pattern=^https?://(client|config|patch|status|version|api).(freefiremobile|garena).com/.*,requires-body=1,max-size=524288,script-path=https://raw.githubusercontent.com/yseavlong2010-dotcom/NOXERA/refs/heads/main/AimX.js
[MITM]
enable = true
CHỈ giải mã các cụm máy chủ truyền tải nội dung game, BỎ QUA hoàn toàn giải mã máy chủ đăng nhập
hostname = client.freefiremobile.com, config.freefiremobile.com, patch.freefiremobile.com, status.freefiremobile.com, version.freefiremobile.com, api.freefiremobile.com, *.garena.com, -auth.garena.com, -sso.garena.com
