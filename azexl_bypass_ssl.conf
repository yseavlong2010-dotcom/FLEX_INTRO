[General]
loglevel = notify
bypass-system = true
dns-server = 1.1.1.1, 8.8.8.8
[Rule]
1. BẮT BUỘC ĐỂ KHÔNG BỊ "NETWORK ERROR": Cho phép các kết nối đăng nhập đi thẳng
DOMAIN-KEYWORD,login,DIRECT
DOMAIN-KEYWORD,auth,DIRECT
DOMAIN-KEYWORD,account,DIRECT
DOMAIN-KEYWORD,ngame,DIRECT
DOMAIN-KEYWORD,connect,DIRECT
DOMAIN-SUFFIX,facebook.com,DIRECT
DOMAIN-SUFFIX,google.com,DIRECT
2. CHẶN KẾT NỐI THEO DÕI (ANTI-BAN)
DOMAIN-KEYWORD,telemetry,REJECT
DOMAIN-KEYWORD,crashreport,REJECT
DOMAIN-KEYWORD,anticheat,REJECT
3. ĐỊNH TUYẾN DỮ LIỆU GAME QUA PROXY
DOMAIN-SUFFIX,garena.com,Proxy
DOMAIN-SUFFIX,freefiremobile.com,Proxy
FINAL,DIRECT
[Script]
Liên kết file Script của bạn
azexl_aim_drag = type=http-response,pattern=^https?://(..garena.com|..freefiremobile.com)/.*,requires-body=1,max-size=131072,script-path=https://raw.githubusercontent.com/yseavlong2010-dotcom/NOXERA/refs/heads/main/AimX.js
[MITM]
enable = true
SỨC MẠNH CỐT LÕI NẰM Ở ĐÂY: Dùng dấu (-) để cấm Shadowrocket giải mã các cổng đăng nhập, tránh bị game sập mạng. Chỉ giải mã dữ liệu sảnh.
hostname = -auth.garena.com, -login.garena.com, -account.garena.com, -ngame.garena.com, -connect.garena.com, -dl.dir.freefiremobile.com, *.garena.com, *.freefiremobile.com
