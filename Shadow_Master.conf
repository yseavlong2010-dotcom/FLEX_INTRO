[General]
loglevel = notify
bypass-system = true
dns-server = 1.1.1.1, 8.8.8.8
[Rule]
=== 1. BẢO VỆ ĐĂNG NHẬP (DIRECT - CHỐNG LỖI MẠNG) ===
DOMAIN-SUFFIX,apple.com,DIRECT
DOMAIN-SUFFIX,icloud.com,DIRECT
DOMAIN-SUFFIX,facebook.com,DIRECT
DOMAIN-SUFFIX,facebook.net,DIRECT
DOMAIN-SUFFIX,google.com,DIRECT
DOMAIN-SUFFIX,googleapis.com,DIRECT
DOMAIN-SUFFIX,gstatic.com,DIRECT
DOMAIN-KEYWORD,garena-sso,DIRECT
DOMAIN-KEYWORD,auth,DIRECT
DOMAIN-KEYWORD,login,DIRECT
=== 2. KHIÊN BẢO VỆ TÀI KHOẢN (ANTI-BAN) ===
DOMAIN-KEYWORD,crashreport,REJECT
DOMAIN-KEYWORD,telemetry,REJECT
DOMAIN-KEYWORD,anticheat,REJECT
=== 3. LUỒNG GAME ĐỊNH TUYẾN QUA PROXY ===
DOMAIN-SUFFIX,garena.com,Proxy
DOMAIN-SUFFIX,freefiremobile.com,Proxy
FINAL,DIRECT
[Script]
Cú pháp Regex tối giản hóa tuyệt đối để tránh làm tràn bộ nhớ Shadowrocket
azexl_aim_drag = type=http-response,pattern=^https?://(client|config|patch|status|version|api).(freefiremobile|garena).com/.*,requires-body=1,max-size=524288,script-path=https://raw.githubusercontent.com/yseavlong2010-dotcom/NOXERA/refs/heads/main/AimX.js
[MITM]
enable = true
Chỉ giữ lại đúng các tên miền tĩnh cần thiết để can thiệp dữ liệu sảnh, tuyệt đối không can thiệp tên miền đăng nhập
hostname = client.freefiremobile.com, config.freefiremobile.com, patch.freefiremobile.com, status.freefiremobile.com, version.freefiremobile.com, api.freefiremobile.com
